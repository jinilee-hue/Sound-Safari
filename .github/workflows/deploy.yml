name: Deploy Sound Safari to Pages

# 저장소 구조는 그대로 두고(게임은 sound_safari/ 하위),
# 배포 시엔 sound_safari/ 폴더 내용만 사이트 루트로 발행 → 기본 주소(.../Sound-Safari/)에서 게임이 열림.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: sound_safari        # 이 폴더가 사이트 루트가 됨(index.html이 진입)
      - id: deployment
        uses: actions/deploy-pages@v4
